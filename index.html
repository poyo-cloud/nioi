<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#f6f1e8" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>匂い研究スケジュール</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="background-glow background-glow-left"></div>
    <div class="background-glow background-glow-right"></div>

    <main class="app-shell">
      <section class="panel" id="setupPanel">
        <div class="panel-title-row">
          <div>
            <p class="eyebrow">Setup</p>
            <h2>パターンを選ぶ</h2>
          </div>
          <span class="badge-soft" id="progressBadge">0 / 7 完了</span>
        </div>

        <label class="field-label" for="sessionLabel">参加者ID / セッション名</label>
        <input
          id="sessionLabel"
          class="text-input"
          type="text"
          maxlength="60"
          placeholder="例: P-01 午前セッション"
        />

        <div class="pattern-grid" id="patternButtons"></div>
        <p class="pattern-summary" id="patternSummary"></p>

        <div class="order-strip" id="orderStrip"></div>
      </section>

      <section class="panel">
        <div class="panel-title-row">
          <div>
            <p class="eyebrow">Running Log</p>
            <h2>進行中の記録</h2>
          </div>
          <span class="badge-soft" id="runningLogCount">0 件</span>
        </div>

        <div id="recordsList" class="records-list"></div>
      </section>

      <section class="panel" id="currentRoundPanel">
        <div class="panel-title-row current-round-header">
          <div class="current-round-main">
            <p class="eyebrow">Current Round</p>
            <h2 id="roundTitle">1回目 / 条件1</h2>
          </div>
          <div class="panel-actions">
            <button id="undoButton" class="button-secondary header-button back-button" type="button">
              前のROUNDに戻る
            </button>
          </div>
        </div>

        <div class="chip-row" id="stepChips"></div>

        <div id="activeRoundControls">
          <form id="scheduleForm" class="time-form">
            <div class="time-input-group">
              <label class="field-label" for="primaryMinutesInput" id="primaryTimeLabel">
                対照安静開始時刻
              </label>
              <div class="time-stack">
                <div class="time-box">
                  <input
                    id="primaryMinutesInput"
                    class="time-input"
                    inputmode="numeric"
                    pattern="[0-9]*"
                    type="number"
                    min="0"
                    placeholder="分"
                  />
                  <span>分</span>
                </div>
                <div class="time-box">
                  <input
                    id="primarySecondsInput"
                    class="time-input"
                    inputmode="numeric"
                    pattern="[0-9]*"
                    type="number"
                    min="0"
                    max="59"
                    placeholder="秒"
                  />
                  <span>秒</span>
                </div>
              </div>
            </div>

            <div class="time-input-group" id="breathingTimeGroup" hidden>
              <label class="field-label" for="breathingMinutesInput">呼吸測定開始時刻</label>
              <div class="time-stack">
                <div class="time-box">
                  <input
                    id="breathingMinutesInput"
                    class="time-input"
                    inputmode="numeric"
                    pattern="[0-9]*"
                    type="number"
                    min="0"
                    placeholder="分"
                  />
                  <span>分</span>
                </div>
                <div class="time-box">
                  <input
                    id="breathingSecondsInput"
                    class="time-input"
                    inputmode="numeric"
                    pattern="[0-9]*"
                    type="number"
                    min="0"
                    max="59"
                    placeholder="秒"
                  />
                  <span>秒</span>
                </div>
              </div>
            </div>

            <button class="button-primary" type="submit">指示を作成</button>
          </form>

          <p class="helper-text" id="helperText">
            空欄は 0 として扱います。例: 5分12秒 の場合は「5」「12」と入力します。
          </p>

          <div class="schedule-grid" id="scheduleCards"></div>

          <label class="field-label" for="roundNote">この条件のメモ</label>
          <textarea
            id="roundNote"
            class="memo-input"
            rows="3"
            placeholder="例: 反応が遅かった / 香りへのコメントあり"
          ></textarea>

          <div class="button-row">
            <button id="saveRoundButton" class="button-primary" type="button" disabled>
              この条件を記録して次へ
            </button>
            <button id="resetButton" class="button-ghost" type="button">
              最初からやり直す
            </button>
          </div>
        </div>
      </section>

      <section class="panel" id="finalPanel" hidden>
        <div class="panel-title-row">
          <div>
            <p class="eyebrow">Finish</p>
            <h2>記録完了</h2>
          </div>
          <span class="badge-strong" id="finalBadge">対照 + 7条件完了</span>
        </div>

        <p class="helper-text">
          この端末の履歴へ自動保存しました。必要なら、あとで別ツールに取り込むためのCSVを書き出してください。
        </p>

        <div class="button-row">
          <button id="exportCsvButton" class="button-primary" type="button">
            CSVを書き出す
          </button>
          <button id="newSessionButton" class="button-ghost" type="button">
            新しいセッションへ
          </button>
        </div>

        <p class="status-text" id="saveStatus"></p>
      </section>

      <section class="panel">
        <div class="panel-title-row">
          <div>
            <p class="eyebrow">History</p>
            <h2>保存済み履歴</h2>
          </div>
          <button id="clearHistoryButton" class="button-ghost danger" type="button">
            履歴を全削除
          </button>
        </div>

        <div id="historyList" class="history-list"></div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
